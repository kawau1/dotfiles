approval_policy = "on-request"
model = "gpt-5.4"
model_reasoning_effort = "xhigh"
network_access = true
personality = "pragmatic"
sandbox_mode = "workspace-write"
suppress_unstable_features_warning = true
service_tier = "fast"
approvals_reviewer = "guardian_subagent"

[features]
apps = true
js_repl = true
multi_agent = true
prevent_idle_sleep = true
voice_transcription = true
remote_models = true
runtime_metrics = true
shell_snapshot = true
search_tool = true
guardian_approval = true
tui_app_server = true

[mcp_servers.context7]
args = [
    "-y",
    "@upstash/context7-mcp",
]
command = "npx"

[shell_environment_policy]
inherit = "core"

[shell_environment_policy.set]
CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS = "1"

[tui]
notifications = true
status_line = ["model-with-reasoning", "current-dir", "git-branch", "context-used", "five-hour-limit", "weekly-limit", "context-window-size"]
terminal_title = ["spinner", "thread", "project", "git-branch", "status", "task-progress"]

[projects."/Users/yuichi"]
trust_level = "trusted"

[projects."/Users/yuichi/dev/lego-studio"]
trust_level = "trusted"

[projects."/Users/yuichi/sotsuken/source/Sotsuken2025"]
trust_level = "trusted"

[projects."/Users/yuichi/dev/material-website"]
trust_level = "trusted"

[plugins."google-calendar@openai-curated"]
enabled = true

[plugins."gmail@openai-curated"]
enabled = true

[plugins."canva@openai-curated"]
enabled = true

[plugins."github@openai-curated"]
enabled = true

[plugins."google-drive@openai-curated"]
enabled = true

[plugins."build-ios-apps@openai-curated"]
enabled = true
